name: Publish npm packages
description: >-
  Downloads the packed Actual npm tarballs from a workflow artifact and
  publishes them to the npm registry.

inputs:
  artifact-name:
    description: 'Name of the workflow artifact containing the packed tarballs'
    required: true
  dist-tag:
    description: 'npm dist-tag to publish under; empty string publishes as `latest`'
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Download the artifacts
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: ${{ inputs.artifact-name }}

    - name: Setup node and npm registry
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 24
        check-latest: true
        # Avoid restoring potentially poisoned caches in release jobs.
        package-manager-cache: false
        registry-url: 'https://registry.npmjs.org'

    - name: Publish Core
      shell: bash
      env:
        DIST_TAG: ${{ inputs.dist-tag }}
      run: npm publish loot-core/@actual-app/core.tgz --access public ${DIST_TAG:+--tag "$DIST_TAG"}

    - name: Publish Web
      shell: bash
      env:
        DIST_TAG: ${{ inputs.dist-tag }}
      run: npm publish desktop-client/@actual-app/web.tgz --access public ${DIST_TAG:+--tag "$DIST_TAG"}

    - name: Publish Sync-Server
      shell: bash
      env:
        DIST_TAG: ${{ inputs.dist-tag }}
      run: npm publish sync-server/@actual-app/sync-server.tgz --access public ${DIST_TAG:+--tag "$DIST_TAG"}

    - name: Publish API
      shell: bash
      env:
        DIST_TAG: ${{ inputs.dist-tag }}
      run: npm publish api/@actual-app/api.tgz --access public ${DIST_TAG:+--tag "$DIST_TAG"}

    - name: Publish CLI
      shell: bash
      env:
        DIST_TAG: ${{ inputs.dist-tag }}
      run: npm publish cli/@actual-app/cli.tgz --access public ${DIST_TAG:+--tag "$DIST_TAG"}
