name: Setup
description: Setup the environment for the project

inputs:
  working-directory:
    description: 'Working directory to run in, default .'
    required: false
    default: '.'
  cache:
    description: 'Whether to restore and save dependency and Lage caches, default true'
    required: false
    default: 'true'

runs:
  using: composite
  steps:
    - name: Install node
      uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
      with:
        node-version: 22
        package-manager-cache: ${{ inputs.cache }}
    - name: Install yarn
      run: npm install -g yarn
      shell: bash
      if: ${{ env.ACT }}
    - name: Get Node version
      id: get-node
      run: echo "version=$(node -v)" >> "$GITHUB_OUTPUT"
      shell: bash
    - name: Cache
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      if: ${{ inputs.cache == 'true' }}
      id: cache
      with:
        path: ${{ format('{0}/**/node_modules', inputs.working-directory) }}
        key: yarn-v1-${{ runner.os }}-${{ steps.get-node.outputs.version }}-${{ hashFiles(format('{0}/**/yarn.lock', inputs.working-directory)) }}
    - name: Ensure Lage cache directory exists
      run: mkdir -p "$WORKING_DIRECTORY/.lage"
      shell: bash
      env:
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
    - name: Cache Lage
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
      if: ${{ inputs.cache == 'true' }}
      with:
        path: ${{ format('{0}/.lage', inputs.working-directory) }}
        key: lage-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          lage-${{ runner.os }}-
    - name: Install
      working-directory: ${{ inputs.working-directory }}
      run: yarn --immutable
      shell: bash
      if: steps.cache.outputs.cache-hit != 'true'
