name: Release in progress
description: >-
  Detects whether a release is currently being prepared. A release is "in
  progress" while the matching release-notes/X.Y.Z branch still exists.

outputs:
  should-run:
    description: '"true" when a release is in progress, otherwise "false"'
    value: ${{ steps.gate.outputs.should-run }}
  version:
    description: 'The version currently on the `release` branch'
    value: ${{ steps.gate.outputs.version }}

runs:
  using: composite
  steps:
    - name: Resolve release version and gate
      id: gate
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Returns 0 if the branch exists, 1 if it genuinely does not (HTTP 404).
        # Any other failure (auth, rate limit, network) is fatal, so a transient
        # error fails the workflow visibly instead of silently skipping the
        # release candidate.
        branch_exists() {
          local branch=$1 output
          if output=$(gh api "repos/${GITHUB_REPOSITORY}/branches/${branch}" --silent 2>&1); then
            return 0
          fi
          if [[ "$output" == *"HTTP 404"* ]]; then
            return 1
          fi
          echo "Failed to check branch '${branch}':" >&2
          echo "$output" >&2
          exit 1
        }

        if ! branch_exists release; then
          echo "No \`release\` branch found; no release in progress."
          echo "should-run=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        version=$(gh api "repos/${GITHUB_REPOSITORY}/contents/packages/desktop-client/package.json?ref=release" --jq '.content' | base64 -d | jq -r .version)
        echo "version=$version" >> "$GITHUB_OUTPUT"

        if branch_exists "release-notes/${version}"; then
          echo "Release $version is in progress."
          echo "should-run=true" >> "$GITHUB_OUTPUT"
        else
          echo "No \`release-notes/${version}\` branch; no release in progress."
          echo "should-run=false" >> "$GITHUB_OUTPUT"
        fi
