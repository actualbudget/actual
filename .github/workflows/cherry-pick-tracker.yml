name: Cherry-pick tracker

on:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  pull-requests: write

concurrency:
  group: cherry-pick-tracker
  cancel-in-progress: false

jobs:
  track-merged-pr:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Add to release PR cherry-pick list
        # uses default GITHUB_TOKEN so this edit does not trigger cherry-pick-apply
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const { owner, repo } = context.repo;

            const pulls = await github.paginate(github.rest.pulls.list, {
              owner,
              repo,
              state: 'open',
            });
            const releasePR = pulls.find(pr => pr.head.ref.startsWith('release/'));

            if (!releasePR) {
              console.log('No open release PR found');
              return;
            }

            const mergedPR = context.payload.pull_request;
            const sha = mergedPR.merge_commit_sha;

            // strip HTML comments and angle brackets to prevent marker injection
            const title = mergedPR.title
              .replace(/<!--[\s\S]*?-->/g, '')
              .replace(/[<>]/g, '')
              .trim();

            let body = releasePR.body || '';

            if (body.includes(`<!-- sha:${sha} -->`)) {
              console.log(`#${mergedPR.number} already tracked, skipping`);
              return;
            }

            const entry = `- [ ] #${mergedPR.number} ${title} <!-- sha:${sha} -->`;

            const headerIndex = body.indexOf('Cherry-pick candidates');
            if (headerIndex !== -1) {
              const closeIndex = body.indexOf('</details>', headerIndex);
              if (closeIndex !== -1) {
                body = body.slice(0, closeIndex) + entry + '\n\n' + body.slice(closeIndex);
              } else {
                console.log('Could not find closing </details> tag');
                body += `\n${entry}\n`;
              }
            } else {
              body += [
                '',
                '',
                '<details>',
                '<summary>Cherry-pick candidates</summary>',
                '',
                entry,
                '',
                '</details>',
                '',
              ].join('\n');
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: releasePR.number,
              body,
            });

            console.log(`Added #${mergedPR.number} to release PR #${releasePR.number}`);
