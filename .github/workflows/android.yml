name: Android Play Store

defaults:
  run:
    shell: bash

env:
  CI: true

# Manual-only to start. Once the first Play Store upload is green, this can be
# extended with `push: tags: v**` to mirror electron-master.yml.
on:
  workflow_dispatch:
    inputs:
      lane:
        description: 'Fastlane lane to run'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - release

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # Android builds run on Linux — no macOS runner required.
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up environment
        uses: ./.github/actions/setup
        with:
          # Avoid restoring potentially poisoned caches in release jobs.
          cache: 'false'

      - name: Set up JDK
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Build web app (capacitor mode) and sync into the Android project
        run: ./bin/package-mobile android --skip-translations

      - name: Decode signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          PLAY_STORE_JSON_KEY_BASE64: ${{ secrets.PLAY_STORE_JSON_KEY_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
          echo "$PLAY_STORE_JSON_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/play-key.json"

      - name: Set up Ruby
        uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: packages/mobile/android

      - name: Build and upload via Fastlane
        working-directory: packages/mobile/android
        env:
          APP_IDENTIFIER: org.actualbudget.app
          BUILD_NUMBER: ${{ github.run_number }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          PLAY_STORE_JSON_KEY_PATH: ${{ runner.temp }}/play-key.json
        run: bundle exec fastlane ${{ inputs.lane }}
