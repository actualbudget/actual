name: Publish release candidate

# Release candidate Docker images and desktop builds are published every day
# while a release is in progress. A release is considered "in progress" while
# the matching `release-notes/X.Y.Z` branch still exists (it is deleted once
# the release PR is merged). The code being built comes from the long-lived
# `release` branch.
#
# Release candidate npm packages are published from publish-npm-packages.yml
# instead, because npm trusted publishing (OIDC) is tied to that one workflow.
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-release-candidate
  cancel-in-progress: false

jobs:
  check:
    name: Check for a release in progress
    runs-on: ubuntu-latest
    if: github.event.repository.fork == false
    outputs:
      should-run: ${{ steps.gate.outputs.should-run }}
      version: ${{ steps.gate.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve release version and gate
        id: gate
        uses: ./.github/actions/release-in-progress

  docker:
    name: Build Docker image
    needs: check
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      packages: write # push images to ghcr.io
    strategy:
      matrix:
        os: [ubuntu, alpine]
    env:
      IMAGES: |
        actualbudget/actual-server
        ghcr.io/${{ github.repository_owner }}/actual-server
        ghcr.io/${{ github.repository_owner }}/actual

      # Creates the following tags:
      # - actual-server:rc
      TAGS: |
        type=raw,value=rc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: release
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          # Push to both Docker Hub and Github Container Registry
          images: ${{ env.IMAGES }}
          flavor: ${{ matrix.os != 'ubuntu' && format('suffix=-{0}', matrix.os) || '' }}
          tags: ${{ env.TAGS }}

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Building outside of the docker image allows us to build once and push to multiple platforms
      # This is faster and avoids yarn memory issues
      - name: Set up environment
        uses: ./.github/actions/setup
        with:
          # Avoid restoring potentially poisoned caches in release jobs.
          cache: 'false'

      - name: Build Web
        run: yarn build:server

      - name: Build image for testing
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          load: true
          file: packages/sync-server/docker/${{ matrix.os }}.Dockerfile
          tags: actualbudget/actual-server-testing

      - name: Test that the docker image boots
        timeout-minutes: 1
        run: |
          docker run --detach --network=host --name actual-server actualbudget/actual-server-testing
          HEALTHCMD=$(yq -r '.services.actual_server.healthcheck.test[1]' packages/sync-server/docker-compose.yml)
          until docker exec actual-server sh -c "$HEALTHCMD"; do sleep 1; done

      - name: Dump container logs on failure
        if: failure()
        run: docker logs actual-server || true

      # This will use the cache from the earlier build step and not rebuild the image
      # https://docs.docker.com/build/ci/github-actions/test-before-push/
      - name: Build and push images
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          file: packages/sync-server/docker/${{ matrix.os }}.Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7${{ matrix.os == 'alpine' && ',linux/arm/v6' || '' }}
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

  build-desktop:
    name: Build desktop app
    needs: check
    if: needs.check.outputs.should-run == 'true'
    environment: release
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    env:
      CI: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: release
          persist-credentials: false

      - if: ${{ startsWith(matrix.os, 'windows') }}
        run: pip.exe install setuptools

      - if: ${{ ! startsWith(matrix.os, 'windows') }}
        run: |
          mkdir .venv
          python3 -m venv .venv
          source .venv/bin/activate
          python3 -m pip install setuptools

      - name: Set up environment
        uses: ./.github/actions/setup
        with:
          # Avoid restoring potentially poisoned caches in release jobs.
          cache: 'false'

      - if: ${{ startsWith(matrix.os, 'ubuntu') }}
        name: Setup Flatpak dependencies
        run: |
          sudo apt-get update
          sudo apt-get install flatpak -y
          sudo apt-get install flatpak-builder -y
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install org.freedesktop.Sdk//24.08 -y
          sudo flatpak install org.freedesktop.Platform//24.08 -y
          sudo flatpak install org.electronjs.Electron2.BaseApp//24.08 -y
          sudo flatpak install org.flatpak.Builder -y

          METAINFO_FILE="packages/desktop-electron/extra-resources/linux/com.actualbudget.actual.metainfo.xml"
          TODAY=$(date +%Y-%m-%d)
          VERSION=$(yarn workspace @actual-app/ci-actions tsx bin/get-next-package-version.ts --package-json ./packages/desktop-electron/package.json --type rc)
          sed -i "s/%RELEASE_VERSION%/$VERSION/g; s/%RELEASE_DATE%/$TODAY/g" "$METAINFO_FILE"
          flatpak run --command=flatpak-builder-lint org.flatpak.Builder appstream "$METAINFO_FILE"

      - name: Update package versions
        run: |
          RC_VERSION=$(yarn workspace @actual-app/ci-actions tsx bin/get-next-package-version.ts --package-json ./packages/desktop-electron/package.json --type rc)
          npm version "$RC_VERSION" --no-git-tag-version --workspace=desktop-electron --no-workspaces-update

      - name: Build Electron for Mac
        if: ${{ startsWith(matrix.os, 'macos') }}
        run: ./bin/package-electron
        env:
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Electron
        if: ${{ ! startsWith(matrix.os, 'macos') }}
        run: ./bin/package-electron

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rc-desktop-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            packages/desktop-electron/dist/Actual-mac-*.dmg
            packages/desktop-electron/dist/Actual-windows-*.exe
            packages/desktop-electron/dist/Actual-linux-*.AppImage

  publish-desktop:
    name: Publish desktop pre-release
    needs: [check, build-desktop]
    if: needs.check.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write # create and update the release candidate pre-release
    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: rc-desktop-*
          path: desktop-artifacts

      - name: Publish rolling pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.check.outputs.version }}
          NOTES: |
            Rolling release candidate for the upcoming release.

            These builds are rebuilt every day from the `release` branch while
            the release is being prepared. They are intended for testing only
            and may contain bugs. Always keep a backup of your budget.
        run: |
          TAG="v${VERSION}-rc"

          # The release is rolling: create it on the first run, then just
          # refresh its assets on subsequent days.
          if ! out=$(gh release create "$TAG" --target release --prerelease --title "Release candidate ${VERSION}" --notes "$NOTES" 2>&1); then
            if [[ "$out" != *already_exists* ]]; then
              echo "$out" >&2
              exit 1
            fi
          fi

          shopt -s globstar nullglob
          files=(desktop-artifacts/**/*.dmg desktop-artifacts/**/*.exe desktop-artifacts/**/*.AppImage)
          if [ ${#files[@]} -gt 0 ]; then
            gh release upload "$TAG" --clobber "${files[@]}"
          fi
