name: Build Stable Docker Image

# Stable Docker images are built for every new tag
on:
  push:
    tags:
      - 'v*.*.*'
    paths-ignore:
      - README.md
      - LICENSE.txt

env:
  IMAGES: |
    actualbudget/actual-server
    ghcr.io/actualbudget/actual-server
    ghcr.io/actualbudget/actual

  # Creates the following tags:
  # - actual-server:latest (see docker/metadata-action flavor inputs, below)
  # - actual-server:1.3
  # - actual-server:1.3.7
  # - actual-server:sha-90dd603
  TAGS: |
    type=semver,pattern={{version}}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build Docker image
    runs-on: blacksmith-4vcpu-ubuntu-2404
    environment: release
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          # Push to both Docker Hub and Github Container Registry
          images: ${{ env.IMAGES }}
          # Automatically update :latest
          flavor: latest=true
          tags: ${{ env.TAGS }}

      - name: Docker meta for Alpine image
        id: alpine-meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.IMAGES }}
          # Automatically update :latest
          flavor: |
            latest=true
            suffix=-alpine,onlatest=true
          tags: ${{ env.TAGS }}

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Building outside of the docker image allows us to build once and push to multiple platforms
      # This is faster and avoids yarn memory issues
      - name: Set up environment
        uses: ./.github/actions/setup
        with:
          # Avoid restoring potentially poisoned caches in release jobs.
          cache: 'false'
      - name: Build Web
        run: yarn build:server

      - name: Build ubuntu image for testing
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          push: false
          load: true
          file: packages/sync-server/docker/ubuntu.Dockerfile
          tags: actualbudget/actual-server-testing

      - name: Test that the ubuntu image boots
        timeout-minutes: 1
        run: |
          docker rm -f actual-server 2>/dev/null || true
          docker run --detach --network=host --name actual-server actualbudget/actual-server-testing
          HEALTHCMD=$(yq -r '.services.actual_server.healthcheck.test[1]' packages/sync-server/docker-compose.yml)
          until docker exec actual-server sh -c "$HEALTHCMD"; do sleep 1; done

      - name: Build and push ubuntu image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          push: true
          file: packages/sync-server/docker/ubuntu.Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          tags: ${{ steps.meta.outputs.tags }}

      - name: Build alpine image for testing
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          push: false
          load: true
          file: packages/sync-server/docker/alpine.Dockerfile
          tags: actualbudget/actual-server-testing

      - name: Test that the alpine image boots
        timeout-minutes: 1
        run: |
          docker rm -f actual-server 2>/dev/null || true
          docker run --detach --network=host --name actual-server actualbudget/actual-server-testing
          HEALTHCMD=$(yq -r '.services.actual_server.healthcheck.test[1]' packages/sync-server/docker-compose.yml)
          until docker exec actual-server sh -c "$HEALTHCMD"; do sleep 1; done

      - name: Build and push alpine image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          push: true
          file: packages/sync-server/docker/alpine.Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          tags: ${{ steps.alpine-meta.outputs.tags }}

      - name: Dump container logs on failure
        if: failure()
        run: docker logs actual-server || true
