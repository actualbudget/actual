name: Publish npm packages

# Npm packages are published for every new tag and nightly schedule
on:
  push:
    tags:
      - 'v*.*.*'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-npm-packages
  cancel-in-progress: false

jobs:
  build-and-pack:
    runs-on: ubuntu-latest
    name: Build and pack npm packages
    if: github.event_name == 'push' || (github.event.repository.fork == false)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up environment
        uses: ./.github/actions/setup
        with:
          # Avoid restoring potentially poisoned caches in release jobs.
          cache: 'false'

      - name: Update package versions
        if: github.event_name != 'push'
        run: |
          # Get new nightly versions
          NEW_CORE_VERSION=$(yarn workspace @actual-app/ci-actions tsx bin/get-next-package-version.ts --package-json ./packages/loot-core/package.json --type nightly)
          NEW_WEB_VERSION=$(yarn workspace @actual-app/ci-actions tsx bin/get-next-package-version.ts --package-json ./packages/desktop-client/package.json --type nightly)
          NEW_SYNC_VERSION=$(yarn workspace @actual-app/ci-actions tsx bin/get-next-package-version.ts --package-json ./packages/sync-server/package.json --type nightly)
          NEW_API_VERSION=$(yarn workspace @actual-app/ci-actions tsx bin/get-next-package-version.ts --package-json ./packages/api/package.json --type nightly)
          NEW_CLI_VERSION=$(yarn workspace @actual-app/ci-actions tsx bin/get-next-package-version.ts --package-json ./packages/cli/package.json --type nightly)

          # Set package versions
          npm version $NEW_CORE_VERSION --no-git-tag-version --workspace=@actual-app/core --no-workspaces-update
          npm version $NEW_WEB_VERSION --no-git-tag-version --workspace=@actual-app/web --no-workspaces-update
          npm version $NEW_SYNC_VERSION --no-git-tag-version --workspace=@actual-app/sync-server --no-workspaces-update
          npm version $NEW_API_VERSION --no-git-tag-version --workspace=@actual-app/api --no-workspaces-update
          npm version $NEW_CLI_VERSION --no-git-tag-version --workspace=@actual-app/cli --no-workspaces-update

      - name: Yarn install
        if: github.event_name != 'push'
        run: |
          # Required after nightly `npm version` updates workspace manifests.
          yarn install

      - name: Pack npm packages
        uses: ./.github/actions/npm-pack
        with:
          artifact-name: npm-packages

  publish:
    runs-on: ubuntu-latest
    name: Publish npm packages
    needs: build-and-pack
    environment: release
    permissions:
      contents: read # check out the repository
      id-token: write # Required for OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Publish npm packages
        uses: ./.github/actions/npm-publish
        with:
          artifact-name: npm-packages
          dist-tag: ${{ github.event_name != 'push' && 'nightly' || '' }}

  check-release:
    runs-on: ubuntu-latest
    name: Check for a release in progress
    if: github.event_name != 'push' && github.event.repository.fork == false
    outputs:
      should-run: ${{ steps.gate.outputs.should-run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve release version and gate
        id: gate
        uses: ./.github/actions/release-in-progress

  build-and-pack-rc:
    runs-on: ubuntu-latest
    name: Build and pack release candidate npm packages
    needs: check-release
    if: needs.check-release.outputs.should-run == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: release
          persist-credentials: false

      - name: Set up environment
        uses: ./.github/actions/setup
        with:
          # Avoid restoring potentially poisoned caches in release jobs.
          cache: 'false'

      - name: Update package versions
        run: |
          # Get the release candidate version for the in-progress release
          RC_VERSION=$(yarn workspace @actual-app/ci-actions tsx bin/get-next-package-version.ts --package-json ./packages/desktop-client/package.json --type rc)
          npm version "$RC_VERSION" --no-git-tag-version --workspace=@actual-app/core --no-workspaces-update
          npm version "$RC_VERSION" --no-git-tag-version --workspace=@actual-app/web --no-workspaces-update
          npm version "$RC_VERSION" --no-git-tag-version --workspace=@actual-app/sync-server --no-workspaces-update
          npm version "$RC_VERSION" --no-git-tag-version --workspace=@actual-app/api --no-workspaces-update
          npm version "$RC_VERSION" --no-git-tag-version --workspace=@actual-app/cli --no-workspaces-update

      - name: Yarn install
        run: |
          # Required after `npm version` updates workspace manifests.
          yarn install

      - name: Pack npm packages
        uses: ./.github/actions/npm-pack
        with:
          artifact-name: rc-npm-packages

  publish-rc:
    runs-on: ubuntu-latest
    name: Publish release candidate npm packages
    needs: [check-release, build-and-pack-rc]
    if: needs.check-release.outputs.should-run == 'true'
    environment: release
    permissions:
      contents: read # check out the repository
      id-token: write # Required for OIDC
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Publish npm packages
        uses: ./.github/actions/npm-publish
        with:
          artifact-name: rc-npm-packages
          dist-tag: rc
