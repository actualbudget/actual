[package]
name = "actual-desktop"
version = "26.3.0"
description = "Actual Budget - Desktop Application"
authors = ["Actual"]
edition = "2021"

[lib]
name = "actual_desktop_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-opener = "2"
tauri-plugin-fs = "2"
tauri-plugin-process = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
dirs = "6"
log = "0.4"
env_logger = "0.11"
fs_extra = "1.3"
portpicker = "0.1"
